<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Viewer</title>
  <style>
    :root {
      --primary: #0969da; --bg: #f6f8fa; --card: #ffffff;
      --border: #d0d7de; --text: #1f2328; --text-muted: #656d76;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.7; padding: 24px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    .back { color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 600; }
    .back:hover { text-decoration: underline; }
    .report-content {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 32px; margin-top: 16px;
    }
    .report-content h1 { font-size: 24px; margin-bottom: 16px; border-bottom: 2px solid var(--border); padding-bottom: 12px; }
    .report-content h2 { font-size: 20px; margin: 24px 0 12px; color: #1a1a2e; }
    .report-content h3 { font-size: 16px; margin: 16px 0 8px; }
    .report-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .report-content th { text-align: left; padding: 8px; border-bottom: 2px solid var(--border); font-size: 12px; color: var(--text-muted); }
    .report-content td { padding: 6px 8px; border-bottom: 1px solid #eee; font-family: 'SF Mono', monospace; }
    .report-content img { max-width: 100%; border-radius: 6px; border: 1px solid var(--border); margin: 12px 0; cursor: pointer; }
    .report-content code { background: #eff1f3; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .report-content pre { background: #0d1117; color: #c9d1d9; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
    .report-content pre code { background: transparent; padding: 0; }
    .report-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .charts-inline { display: grid; gap: 20px; margin: 16px 0; }
    .charts-inline img:hover { transform: scale(1.005); transition: transform .2s; }
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.7); z-index: 100; justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
    .loading { text-align: center; padding: 60px; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="container">
  <a href="/" class="back">&larr; Back to Dashboard</a>
  <div class="report-content" id="reportContent">
    <div class="loading">Loading report...</div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="this.classList.remove('show')">
  <img class="modal-img" id="modalImg" src="">
</div>

<script>
const jobId = "{{ job_id }}";

// Simple markdown to HTML (enough for our reports)
function md2html(md) {
  let html = md
    // Images - replace with actual API URLs
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(match, alt, src) {
      return `<img src="/api/chart/${jobId}/${src}" alt="${alt}" onclick="showModal(this.src)" onerror="this.style.display='none'">`;
    })
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // HR
    .replace(/^---$/gm, '<hr>')
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/gm, '<pre><code>$2</code></pre>')
    // Tables
    .replace(/^\|(.+)\|$/gm, function(match) {
      if (match.match(/^\|[\s-:|]+\|$/)) return '<!--sep-->';
      const cells = match.split('|').filter(c => c.trim() !== '');
      return cells.map(c => `<td>${c.trim()}</td>`).join('');
    });

  // Wrap table rows
  let lines = html.split('\n');
  let inTable = false;
  let result = [];
  for (let line of lines) {
    if (line.startsWith('<td>')) {
      if (!inTable) { result.push('<table>'); inTable = true; }
      result.push('<tr>' + line + '</tr>');
    } else if (line === '<!--sep-->') {
      // skip separator row
    } else {
      if (inTable) { result.push('</table>'); inTable = false; }
      if (line.trim()) result.push(line.startsWith('<') ? line : `<p>${line}</p>`);
    }
  }
  if (inTable) result.push('</table>');

  return result.join('\n');
}

fetch('/api/report/' + jobId)
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      document.getElementById('reportContent').innerHTML = `<p style="color:red">${data.error}</p>`;
      return;
    }
    document.getElementById('reportContent').innerHTML = md2html(data.markdown);
  })
  .catch(err => {
    document.getElementById('reportContent').innerHTML = '<p>Failed to load report.</p>';
  });

function showModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modal').classList.add('show');
}
</script>
</body>
</html>
